<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crop Suitability | OptiCrop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-success">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">🌱 OptiCrop</a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/recommendation">Recommendation</a>
            <a class="nav-link active" href="/suitability">Suitability</a>
            <a class="nav-link" href="/research">Research</a>
            <a class="nav-link" href="/about">About</a>
            <a class="nav-link" href="/contact">Contact</a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg">

                <div class="card-header bg-success text-white text-center">

                    <h2>🌾 Crop Suitability Checker</h2>

                </div>

                <div class="card-body">

                    <form action="/check_suitability" method="POST">

                        <div class="mb-3">

                            <label class="form-label">Select Crop</label>

                            <select class="form-select" name="crop" required>

                                <option value="">Choose Crop</option>

                                <option>Rice</option>
                                <option>Maize</option>
                                <option>Jute</option>
                                <option>Cotton</option>
                                <option>Wheat</option>
                                <option>Barley</option>
                                <option>Coffee</option>
                                <option>Tea</option>
                                <option>Sugarcane</option>
                                <option>Mango</option>
                                <option>Banana</option>
                                <option>Papaya</option>
                                <option>Orange</option>
                                <option>Apple</option>
                                <option>Pomegranate</option>
                                <option>Watermelon</option>
                                <option>Muskmelon</option>
                                <option>Grapes</option>
                                <option>Coconut</option>
                                <option>Blackgram</option>
                                <option>Chickpea</option>
                                <option>Lentil</option>

                            </select>

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label>Nitrogen</label>

                                <input type="number"
                                       class="form-control"
                                       name="nitrogen"
                                       required>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label>Phosphorous</label>

                                <input type="number"
                                       class="form-control"
                                       name="phosphorus"
                                       required>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label>Potassium</label>

                                <input type="number"
                                       class="form-control"
                                       name="potassium"
                                       required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label>Temperature (°C)</label>

                                <input type="number"
                                       step="0.1"
                                       class="form-control"
                                       name="temperature"
                                       required>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label>Humidity (%)</label>

                                <input type="number"
                                       step="0.1"
                                       class="form-control"
                                       name="humidity"
                                       required>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label>pH</label>

                                <input type="number"
                                       step="0.1"
                                       class="form-control"
                                       name="ph"
                                       required>

                            </div>

                        </div>

                        <div class="mb-4">

                            <label>Rainfall (mm)</label>

                            <input type="number"
                                   step="0.1"
                                   class="form-control"
                                   name="rainfall"
                                   required>

                        </div>

                        <div class="text-center">

                            <button type="submit"
                                    class="btn btn-success btn-lg">

                                Check Suitability

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="bg-success text-white text-center mt-5 p-3">

    <h5>OptiCrop</h5>

    <p>Smart Agricultural Production Optimization Engine</p>

</footer>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
